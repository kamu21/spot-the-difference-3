<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>間違い探しゲーム</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- スタート画面 -->
<div id="intro-screen" class="intro-screen">
    <h1>間違い探し</h1>
    <p>違いを見つけて　軽くタッチ！　（３分間）</p>
    <button id="start-btn" class="start-btn">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="game-screen">

    <div class="image-container">
        <div class="image-wrapper">
            <img id="image1">
        </div>
        <div class="image-wrapper">
            <img id="image2">
        </div>
    </div>

    <!-- ② 横並びUI -->
    <div class="bottom-ui">
        <div id="result" class="result"></div>
        <div id="timer" class="timer">残り 3:00</div>
    </div>

    <!-- 音 -->
    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mp3">
    </audio>

    <audio id="correctSound">
        <source src="correct.mp3" type="audio/mp3">
    </audio>

    <!-- ④ 赤丸音 -->
    <audio id="circleSound">
        <source src="circle.mp3" type="audio/mp3">
    </audio>

    <!-- ⑤ 結果音 -->
    <audio id="resultSound">
        <source src="result.mp3" type="audio/mp3">
    </audio>

</div>

<!-- 結果画面 -->
<div id="result-screen" class="intro-screen" style="display:none;">
    <h1>結果発表</h1>
    <p id="final-score"></p>
    <button id="restart-btn" class="start-btn">もう一度遊ぶ</button>
</div>

<script src="script.js"></script>
</body>
</html>
